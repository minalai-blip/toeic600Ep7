<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【EP05】多益600核心單字・基礎打底特訓</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #f39c12; 
            --blue: #3498db;
            --success: #2ecc71; 
            --error: #ff7675;   
            --bg: #f4f7f9;
            --grey: #7f8c8d;
        }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); margin: 0; padding: 5px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        
        .banner { width: 100%; height: auto; display: block; transition: 0.2s; }
        .banner.compact { max-height: 50px; object-fit: cover; }

        .content-padding { padding: 12px 18px; }

        .intro-header h1 { font-size: 1.3rem; color: var(--primary); margin: 0 0 5px 0; }
        .intro-header p { font-size: 0.9rem; color: #555; margin: 0; font-weight: bold; }

        .header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; font-size: 0.85rem; color: var(--grey); }
        .progress-container { width: 100%; background: #eee; height: 5px; border-radius: 3px; margin-bottom: 12px; }
        .progress-bar { height: 100%; background: var(--blue); width: 0%; transition: 0.4s; }
        
        .question-box { min-height: 90px; margin-bottom: 12px; }
        .type-tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; background: #e8f4fd; color: var(--blue); margin-bottom: 5px; font-weight: bold; }
        .word { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; line-height: 1.3; }
        .q-text { font-size: 1.1rem; color: #333; line-height: 1.5; padding: 12px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #ddd; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: bold; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-true { background: var(--success); }
        .btn-false { background: var(--error); }
        .next-btn { width: 100%; background: var(--primary); margin-top: 10px; display: none; box-shadow: none; }
        
        .feedback { display: none; margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 1rem; font-weight: bold; text-align: center; }
        .correct-bg { background: #d4edda; color: #155724; }
        .wrong-bg { background: #f8d7da; color: #721c24; }

        /* 結果頁樣式 */
        .result-screen { display: none; text-align: center; }
        .final-score { font-size: 2.2rem; color: var(--blue); font-weight: bold; margin-bottom: 8px; }
        
        .history-container { background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: left; border: 1px solid #edf2f7; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-title { font-size: 0.85rem; font-weight: bold; color: var(--primary); }
        
        .clear-btn { 
            font-size: 0.75rem; color: #e74c3c; cursor: pointer; background: #fff1f0; 
            border: 1px solid #ffa39e; padding: 3px 8px; border-radius: 6px; 
            transition: 0.2s; font-weight: bold;
        }

        .history-item { display: flex; justify-content: space-between; font-size: 0.8rem; color: #666; padding: 4px 0; border-bottom: 1px dashed #e2e8f0; }
        
        .review-container { text-align: left; margin-bottom: 12px; max-height: 140px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 5px; }
        .review-item { padding: 5px; border-bottom: 1px solid #f1f1f1; font-size: 0.8rem; display: flex; align-items: flex-start; }
        .review-icon { margin-right: 6px; flex-shrink: 0; }

        .cta-button { 
            display: block; width: 100%; padding: 14px; background: var(--secondary); color: white; 
            text-decoration: none; border-radius: 30px; font-size: 1.1rem; font-weight: bold; 
            margin: 15px 0 10px 0; box-shadow: 0 4px 12px rgba(243, 156, 18, 0.3);
            text-align: center; box-sizing: border-box; 
        }
        
        .retry-link { display: inline-block; color: var(--blue); text-decoration: none; font-size: 0.85rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; }

        .footer-upsell { 
            font-size: 0.75rem; color: #999; line-height: 1.6; border-top: 1px solid #eee; 
            padding-top: 15px; text-align: center; 
        }
        .shopee-link { color: var(--blue); font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <img src="banner.jpg" id="main-banner" alt="【EP05】基礎打底特訓" class="banner"> 

    <div class="content-padding">
        <div id="intro-area" class="intro-header">
            <h1>【EP07】基礎打底特訓</h1>
            <p>🔥 直覺 3 秒挑戰。5 題快速上手。🔥</p>
        </div>

        <div id="quiz-section">
            <div class="header">
                <span id="q-count">題目 1 / 5</span>
                <span id="score-count">得分: 0</span>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
            
            <div class="question-box">
                <div id="type-tag" class="type-tag">載入中</div>
                <div id="word" class="word">Word</div>
                <div id="content" class="q-text">載入中...</div>
            </div>

            <div class="btn-group">
                <button class="btn-true" onclick="handleAnswer(true)">True 正確</button>
                <button class="btn-false" onclick="handleAnswer(false)">False 錯誤</button>
            </div>

            <div id="feedback" class="feedback"></div>
            <button id="next-btn" class="next-btn" onclick="nextQuestion()">下一題 →</button>
        </div>

        <div id="result-section" class="result-screen">
            <div class="final-score" id="final-score">0 / 100</div>
            
            <div class="history-container">
                <div class="history-header">
                    <span class="history-title">📈 最近 5 次成績紀錄</span>
                    <button class="clear-btn" onclick="confirmClear()">清除紀錄</button>
                </div>
                <div id="history-list"></div>
            </div>

            <div class="review-container" id="review-list"></div>
            
            <div><span class="retry-link" onclick="initQuiz()">↺ 再練一次這組單字</span></div>

            <a href="https://docs.google.com/forms/d/e/1FAIpQLSdNkem-vuwWTDc5eEfhv4FlqpubNv7dsoY0uFQEcv4c5rCtyg/viewform?usp=header" class="cta-button" target="_blank">前往👉實戰驗收：📝多益模擬題型</a>

            <div class="footer-upsell">
                💡 這套「直覺單字+實戰刷題」模式很有效吧!完整多益衝刺計畫已在蝦皮上架。<br>
                <a href="https://shopee.tw/YOUR_LINK" class="shopee-link" target="_blank">點此前往蝦皮賣場看更多</a>
            </div>
        </div>
    </div>
</div>

<script>
// 【EP05】基礎打底特訓 151–175 核心資料庫
const rawData = [
    { type: "單字辨析", word: "a medical <u><b>device</b></u> manufacturer", show: "策略、方法", ans: false, feedback: "device 是名詞「儀器、裝置」。" },
    { type: "句型搭配", word: "device", show: "a medical ______ manufacturer / 填入：device", ans: true, feedback: "應填入 device。" },
    { type: "單字辨析", word: "Who is the announcement <u><b>intended</b></u> for?", show: "以...為對象的", ans: true, feedback: "intended 是形容詞「以...為對象的、預期的」。" },
    { type: "句型搭配", word: "intended", show: "Who is the announcement ______ for? / 填入：intended", ans: true, feedback: "應填入 intended。" },
    { type: "單字辨析", word: "a travel <u><b>brochure</b></u>", show: "行李箱", ans: false, feedback: "brochure 是名詞「小冊子、說明書」。" },
    { type: "句型搭配", word: "brochure", show: "a travel ______ / 填入：brochure", ans: true, feedback: "應填入 brochure。" },
    { type: "單字辨析", word: "by express <u><b>mail</b></u>", show: "郵件、郵遞", ans: true, feedback: "mail 是名詞「郵件、郵遞」。" },
    { type: "句型搭配", word: "mail", show: "by express ______ / 填入：mail", ans: true, feedback: "應填入 mail。" },
    { type: "單字辨析", word: "I <u><b>prefer</b></u> flexible working hours.", show: "拒絕、嫌棄", ans: false, feedback: "prefer 是動詞「更喜歡」。" },
    { type: "句型搭配", word: "prefer", show: "I ______ flexible working hours. / 填入：prefer", ans: true, feedback: "應填入 prefer。" },
    { type: "單字辨析", word: "I'm writing in <u><b>response</b></u> to your inquiry.", show: "回答、答覆", ans: true, feedback: "response 是名詞「回答、答覆」。" },
    { type: "句型搭配", word: "response", show: "I'm writing in ______ to your inquiry. / 填入：response", ans: true, feedback: "應填入 response。" },
    { type: "單字辨析", word: "expand business in the southern <u><b>region</b></u>", show: "季節", ans: false, feedback: "region 是名詞「地區」。" },
    { type: "句型搭配", word: "region", show: "expand business in the southern ______ / 填入：region", ans: true, feedback: "應填入 region。" },
    { type: "單字辨析", word: "make a <u><b>donation</b></u> to charity", show: "捐獻", ans: true, feedback: "donation 是名詞「捐獻、捐款」。" },
    { type: "句型搭配", word: "donation", show: "make a ______ to charity / 填入：donation", ans: true, feedback: "應填入 donation。" },
    { type: "單字辨析", word: "the first <u><b>quarter</b></u>", show: "四分之一、季", ans: true, feedback: "quarter 是名詞「季、四分之一」。" },
    { type: "句型搭配", word: "quarter", show: "the first ______ / 填入：quarter", ans: true, feedback: "應填入 quarter。" },
    { type: "單字辨析", word: "sign a rental <u><b>agreement</b></u>", show: "爭執、分歧", ans: false, feedback: "agreement 是名詞「協議、同意(書)」。" },
    { type: "句型搭配", word: "agreement", show: "sign a rental ______ / 填入：agreement", ans: true, feedback: "應填入 agreement。" },
    { type: "單字辨析", word: "submit an article to a <u><b>journal</b></u>", show: "期刊", ans: true, feedback: "journal 是名詞「期刊、日誌」。" },
    { type: "句型搭配", word: "journal", show: "submit an article to a ______ / 填入：journal", ans: true, feedback: "應填入 journal。" },
    { type: "單字辨析", word: "<u><b>distribute</b></u> documents during the meeting", show: "收集、聚集", ans: false, feedback: "distribute 是動詞「分配、分發」。" },
    { type: "句型搭配", word: "distribute", show: "______ documents during the meeting / 填入：distribute", ans: true, feedback: "應填入 distribute。" },
    { type: "單字辨析", word: "<u><b>potential</b></u> customers online", show: "潛在的", ans: true, feedback: "potential 是形容詞「潛在的」。" },
    { type: "句型搭配", word: "potential", show: "______ customers online / 填入：potential", ans: true, feedback: "應填入 potential。" },
    { type: "單字辨析", word: "<u><b>reschedule</b></u> an appointment", show: "取消預約", ans: false, feedback: "reschedule 是動詞「重新安排時間」。" },
    { type: "句型搭配", word: "reschedule", show: "______ an appointment / 填入：reschedule", ans: true, feedback: "應填入 reschedule。" },
    { type: "單字辨析", word: "<u><b>renew</b></u> a contract", show: "更新合約、續期", ans: true, feedback: "renew 是動詞「更新、續期」。" },
    { type: "句型搭配", word: "renew", show: "______ a contract / 填入：renew", ans: true, feedback: "應填入 renew。" },
    { type: "單字辨析", word: "ship from a <u><b>warehouse</b></u>", show: "一般住宅", ans: false, feedback: "warehouse 是名詞「倉庫」。" },
    { type: "句型搭配", word: "warehouse", show: "ship from a ______ / 填入：warehouse", ans: true, feedback: "應填入 warehouse。" },
    { type: "單字辨析", word: "a full <u><b>refund</b></u>", show: "退款", ans: true, feedback: "refund 是名詞「退款」。" },
    { type: "句型搭配", word: "refund", show: "a full ______ / 填入：refund", ans: true, feedback: "應填入 refund。" },
    { type: "單字辨析", word: "What are customers <u><b>advised</b></u> to do after the recall?", show: "被命令、強迫", ans: false, feedback: "advise 是動詞「勸告、忠告、建議」。" },
    { type: "句型搭配", word: "advise", show: "What are customers ______d to do after the recall? / 填入: advise", ans: true, feedback: "應填入 advise。" },
    { type: "單字辨析", word: "Please reply <u><b>immediately</b></u>", show: "立即、馬上", ans: true, feedback: "immediately 是副詞「立即、馬上」。" },
    { type: "句型搭配", word: "immediately", show: "Please reply ______ / 填入：immediately", ans: true, feedback: "應填入 immediately。" },
    { type: "單字辨析", word: "the city <u><b>council</b></u>", show: "法庭", ans: false, feedback: "council 是名詞「議會」。" },
    { type: "句型搭配", word: "council", show: "the city ______ / 填入：council", ans: true, feedback: "應填入 council。" },
    { type: "單字辨析", word: "The news will be <u><b>broadcast</b></u> tonight.", show: "播放", ans: true, feedback: "broadcast 是動詞「播放、廣播」。" },
    { type: "句型搭配", word: "broadcast", show: "The news will be ______ tonight. / 填入：broadcast", ans: true, feedback: "應填入 broadcast。" },
    { type: "單字辨析", word: "Who is <u><b>responsible</b></u> for customer complaints?", show: "推卸責任的", ans: false, feedback: "responsible 是形容詞「負責(任)的」。" },
    { type: "句型搭配", word: "responsible", show: "Who is ______ for customer complaints? / 填入：responsible", ans: true, feedback: "應填入 responsible。" },
    { type: "單字辨析", word: "<u><b>avoid</b></u> unnecessary costs", show: "避免", ans: true, feedback: "avoid 是動詞「避免」。" },
    { type: "句型搭配", word: "avoid", show: "______ unnecessary costs / 填入：avoid", ans: true, feedback: "應填入 avoid。" },
    { type: "單字辨析", word: "<u><b>effective</b></u> advertising campaigns", show: "無效的", ans: false, feedback: "effective 是形容詞「有效的;生效的」。" },
    { type: "句型搭配", word: "effective", show: "______ advertising campaigns / 填入：effective", ans: true, feedback: "應填入 effective。" },
    { type: "單字辨析", word: "send an <u><b>invitation</b></u> by e-mail", show: "邀請(函)", ans: true, feedback: "invitation 是名詞「邀請(函)」。" },
    { type: "句型搭配", word: "invitation", show: "send an ______ by e-mail / 填入：invitation", ans: true, feedback: "應填入 invitation。" }
];

let questions = [];
let currentIndex = 0;
let score = 0;
let userHistoryList = []; 

function initQuiz() {
    const shuffled = [...rawData].sort(() => 0.5 - Math.random());
    questions = shuffled.slice(0, 5);
    currentIndex = 0; score = 0; userHistoryList = [];
    document.getElementById('main-banner').classList.remove('compact');
    document.getElementById('intro-area').style.display = 'block';
    document.getElementById('quiz-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
    document.getElementById('score-count').innerText = "得分: 0";
    loadQuestion();
}

function loadQuestion() {
    const q = questions[currentIndex];
    document.getElementById('q-count').innerText = `題目 ${currentIndex + 1} / 5`;
    document.getElementById('progress').style.width = `${((currentIndex + 1) / 5) * 100}%`;
    document.getElementById('type-tag').innerText = q.type;
    const wordEl = document.getElementById('word');
    
    if (q.type === "句型搭配") {
        wordEl.style.display = 'none';
        document.getElementById('content').innerText = q.show;
    } else {
        wordEl.style.display = 'block';
        wordEl.innerHTML = q.word; 
        document.getElementById('content').innerText = `底線字的意思是：${q.show}`;
    }
    
    document.getElementById('feedback').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.querySelectorAll('.btn-group button').forEach(b => b.disabled = false);
}

function handleAnswer(userAns) {
    const q = questions[currentIndex];
    const feedback = document.getElementById('feedback');
    document.querySelectorAll('.btn-group button').forEach(b => b.disabled = true);
    feedback.style.display = 'block';
    const isCorrect = (userAns === q.ans);
    userHistoryList.push({ word: q.word, isCorrect: isCorrect, feedback: q.feedback });
    if (isCorrect) {
        score += 20;
        feedback.innerText = "✅ " + q.feedback;
        feedback.className = "feedback correct-bg";
    } else {
        feedback.innerText = "❌ " + q.feedback;
        feedback.className = "feedback wrong-bg";
    }
    document.getElementById('score-count').innerText = `得分: ${Math.round(score)}`;
    document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < 5) loadQuestion(); else showResult();
}

function showResult() {
    document.getElementById('main-banner').classList.add('compact');
    document.getElementById('intro-area').style.display = 'none';
    document.getElementById('quiz-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('final-score').innerText = Math.round(score) + " / 100";
    
    const now = new Date();
    const timeStr = `${now.getMonth() + 1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

    let history = JSON.parse(localStorage.getItem('toeic_history_ep05_v5')) || [];
    history.unshift({ score: score, time: timeStr });
    if(history.length > 5) history.pop();
    localStorage.setItem('toeic_history_ep05_v5', JSON.stringify(history));
    renderHistoryList(history);

    document.getElementById('review-list').innerHTML = userHistoryList.map(item => `
        <div class="review-item">
            <span class="review-icon">${item.isCorrect ? '✅' : '❌'}</span>
            <div><b>${item.word || ''}</b> <br> ${item.feedback}</div>
        </div>
    `).join('');
}

function renderHistoryList(history) {
    const listEl = document.getElementById('history-list');
    if (!history || history.length === 0) {
        listEl.innerHTML = '<div style="font-size:0.8rem; color:#999; padding: 5px 0;">尚無紀錄</div>';
        return;
    }
    listEl.innerHTML = history.map(item => `
        <div class="history-item">
            <span>時間：${item.time}</span>
            <b style="color:var(--blue)">${Math.round(item.score)} 分</b>
        </div>
    `).join('');
}

function confirmClear() {
    if (confirm("確定要清除所有練習紀錄嗎？")) {
        localStorage.removeItem('toeic_history_ep05_v5');
        renderHistoryList([]);
    }
}

initQuiz();
</script>
</body>
</html>
